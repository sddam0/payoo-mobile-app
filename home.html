<body class="bg-[#F4F5F7] h-[100vh]">
    <div class="max-w-lg mx-auto bg-white rounded-b-xl">

            <img src="./assets/Group.png" class="h-[50px]" alt="">

            </div>
        </div>
        <div><button class="btn text-[#08080880]"> <i class="fa-solid fa-arrow-right-from-bracket rotate-180 text-gray-700"></i> Log Out</button></div>

    </div>

    <div class="mt-8 p-3">
        <h1 class="text-2xl font-bold">🔥 Welcome to Payooo!</h1> <br>
        <p class="text-[#08080880]">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        <br>
    </div>

    <div class="min-h-[200px] grid grid-cols-3 gap-4 p-3">

<div class="border-2 border-gray-300 text-center p-3 rounded-xl">
    <img src="./assets/wallet1.png" class="mx-auto" alt="">
    <h1>Add Money</h1>
</div>
<div class="border-2 border-gray-300 text-center p-3 rounded-xl">
    <img src="./assets/send1.png" class="mx-auto" alt="">

</div>
<div class="border-2 border-gray-300 text-center p-3 rounded-xl">
    <img src="./assets/money1.png" class="mx-auto" alt="">

</div>
<div class="border-2 border-gray-300 text-center p-3 rounded-xl">

</div>
<div class="border-2 border-gray-300 text-center p-3 rounded-xl">

</div>
<div class="border-2 border-gray-300 text-center p-3 rounded-xl">
    <img src="./assets/transaction1.png" class="mx-auto" alt="">
    <h1>Transactions</h1>
</div>

    </div>
    
    </div>

    <!-- from fild -->
     <div class="all-from-sections max-w-lg mx-auto">

         <div>
            <h1 class="my-5 font-bold">Add Money</h1>
            <form action="" class="bg-white rounded-2xl p-8">
                <div class="mb-3">
                    <h1 class="font-semibold">Select a Bank</h1>
                    <select class="select bg-[#F4F5F7] mt-3 rounded-3xl w-full">
  <option>Pick a Bank</option>
  <option>AB Bank</option>
  <option>DB Bank</option>
  <option>IS Bank</option>
</select>
                </div>
                <div>
                    <label class="font-semibold" for="">Bank Account Number</label> <br>
            <input type="text" placeholder="Enter 11 digit account number" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full" />
                </div>
                <div class="mt-3"><label class="font-semibold" for="">Amount to Add</label> <br>
            <input type="text" placeholder="Add Amount to withdraw" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full" /></div>
                <div class="mt-3">
                    <label class="font-semibold" for="">Pin Number</label> <br>
            <input type="text" placeholder="Enter 4 digit pin number" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full" />
                </div>
                <button class="btn bg-[#0874F2] text-white font-bold mt-5 w-full rounded-3xl">Add Money</button>
            </form>
         </div>

     </div>
